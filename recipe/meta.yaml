{% set name = "bodkin" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/bodkin-{{ version }}.tar.gz
  sha256: 82f540e745f01b1fb81d54ee0bfa5c55e01dcbafd9451ed845766f55ba2dd113

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - graphviz

test:
  imports:
    - bodkin
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://gitlab.com/samflam/bodkin
  summary: Library to create and execute computation graphs
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - aarongaut
